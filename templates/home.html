{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <h3 class="mb-4 fw-bold">안드로이드 앱 개인정보 처리방침 신뢰도 검사</h3>

    <div class="row justify-content-center align-items-start">
        <div class="col-md-8 text-start">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- APK 업로드 -->
                <label for="apk_file" class="form-label fw-bold">APK 파일</label>
                <input type="file" name="apk_file" id="apk_file"
                       class="form-control mb-3"
                       accept=".apk,.xapk" required>

                <!-- 개인정보 처리방침 -->
                <label for="policy" class="form-label fw-bold">개인정보 처리방침</label>
                <textarea id="policy" name="policy_text" class="form-control mb-4"
                          rows="10" placeholder="개인정보 처리방침을 붙여넣으세요"
                          required spellcheck="false"></textarea>

                <!-- 제출 버튼 -->
                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5 py-3 shadow-sm">
                        분석 시작
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
