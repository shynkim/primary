{% extends "base.html" %}

{% block title %}분석 결과{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm">
    <h2 class="mb-3">분석 결과 페이지 🎉</h2>

    {% if policy_text %}
        <p><strong>입력한 처리방침:</strong></p>
        <div class="border p-3" style="white-space:pre-wrap;">{{ policy_text }}</div>
    {% endif %}

    <a href="/" class="btn btn-primary mt-3">홈으로 돌아가기</a>
</div>
{% endblock %}
