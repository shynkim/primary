{% extends "base.html" %}

{% block title %}Result{% endblock %}

{% block content %}
<div class="container mt-5">
    <h3 class="fw-bold">분석 결과</h3>

    {% if uploaded_file %}
        <p>📦 업로드된 APK파일: <strong>{{ uploaded_file }}</strong></p>
    {% endif %}

    {% if policy_text %}
        <h5 class="mt-4">개인정보 처리방침</h5>
        <pre class="border p-3">{{ policy_text }}</pre>
    {% endif %}
</div>
{% endblock %}
